<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>条形码生成器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <!-- 头部 -->
        <header class="page-header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1>条形码生成器</h1>
                        <p>Excel 数据 · 批量生成 · 扫码打印</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="page-content">
            <div class="content-card">
                <!-- 上传区域 -->
                <section class="upload-section">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </div>
                        <p class="upload-title">拖拽 Excel 文件到此处</p>
                        <p class="upload-subtitle">或点击选择文件</p>
                        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" hidden>
                    </div>

                    <div class="format-hint">
                        <div class="hint-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            Excel 模板格式
                        </div>
                        <div class="hint-body">
                            <div class="hint-item">
                                <span class="hint-col">第一列</span>
                                <span class="hint-val">编码（如 02060001）</span>
                            </div>
                            <div class="hint-item">
                                <span class="hint-col">第二列</span>
                                <span class="hint-val">品名（如 螺丝M6x30）</span>
                            </div>
                        </div>
                        <div class="hint-footer">支持 .xlsx、.xls、.csv 格式</div>
                    </div>
                </section>

                <p class="file-info" id="fileInfo"></p>

                <!-- 预览区域 -->
                <section class="preview-section" id="previewSection" style="display: none;">
                    <div class="section-title">
                        <span>数据预览</span>
                        <span class="count-badge" id="previewCount"></span>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>编码</th>
                                    <th>品名</th>
                                </tr>
                            </thead>
                            <tbody id="previewBody"></tbody>
                        </table>
                    </div>
                </section>

                <!-- 设置区域 -->
                <section class="settings-section" id="settingsSection" style="display: none;">
                    <div class="section-title">布局设置</div>
                    <div class="setting-row">
                        <span class="setting-label">每行条形码数量</span>
                        <div class="radio-group" id="columnsGroup">
                            <label class="radio-item">
                                <input type="radio" name="columns" value="4">
                                <span>4个</span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="columns" value="5" checked>
                                <span>5个</span>
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="columns" value="6">
                                <span>6个</span>
                            </label>
                        </div>
                    </div>
                </section>

                <!-- 生成按钮 -->
                <section class="action-section" id="actionSection" style="display: none;">
                    <button class="btn-generate" id="generateBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        生成 PDF 下载
                    </button>
                </section>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="page-footer">
            <p>Code128 条形码 · A4 纸张直接打印</p>
        </footer>
    </div>

    <script src="lib/xlsx.full.min.js"></script>
    <script src="lib/jspdf.min.js"></script>
    <script src="lib/JsBarcode.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
